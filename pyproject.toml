[tool.poetry]
name = "northlighttools"
version = "1.0.0"
description = "Collection of various tools for Northlight Engine used for Polish fan translation of Quantum Break!"
authors = ["Marek Grzyb <marek@grzyb.dev>"]
readme = "README.md"

[tool.poetry.scripts]
northlighttools = "northlighttools.main:app"

[tool.poetry.dependencies]
python = "^3.13"
typer = "^0.15.1"
pillow = "^11.0.0"
numpy = "^2.2.0"
polib = "^1.2.0"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
